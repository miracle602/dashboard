<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌟 学习小星球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fef9ef;color:#2d3436;min-height:100vh;padding-bottom:80px;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
.nav{position:fixed;bottom:0;left:0;right:0;height:58px;background:#fff;border-top:1px solid #f1f5f9;display:flex;z-index:100}
.nav .item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#94a3b8;cursor:pointer;gap:2px}
.nav .item .icon{font-size:20px}
.nav .item.active{color:#8b5cf6;font-weight:700}
.page{display:none;padding:16px;padding-top:12px;max-width:600px;margin:0 auto}
.page.active{display:block}
.section-title{font-size:16px;font-weight:800;margin-bottom:12px}
.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid rgba(0,0,0,.04)}
.empty{text-align:center;color:#94a3b8;padding:30px 0;font-size:13px}
.submit-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
.submit-btn.pink{background:linear-gradient(135deg,#ff8fab,#ff6b8a)}
.submit-btn.green{background:linear-gradient(135deg,#06d6a0,#04c392)}
.welcome-card{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:20px;padding:20px 22px;margin-bottom:16px}
.welcome-card .greeting{font-size:18px;font-weight:800}
.welcome-card .sub{font-size:13px;opacity:.8;margin-top:4px}
.trend-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.trend-card{min-width:100px;background:#fff;border-radius:14px;padding:12px;border:1px solid #f1f5f9}
.trend-card .subject{font-size:11px;color:#64748b;font-weight:700;margin-bottom:2px}
.trend-card .score{font-size:20px;font-weight:800}
.trend-card .up{color:#10b981}.trend-card .down{color:#ef4444}
.mistake-item{border-left:4px solid #ff8fab;margin-bottom:10px;cursor:pointer}
.mistake-item .mi-subject{font-size:10px;font-weight:700;color:#fff;padding:2px 8px;border-radius:8px;display:inline-block}
.mi-subject.math{background:#4cc9f0}.mi-subject.chinese{background:#ff8fab}.mi-subject.english{background:#06d6a0}
.mistake-item .badge{font-size:10px;padding:2px 8px;border-radius:10px}
.badge.review{background:#fef3c7;color:#92400e}.badge.done{background:#d1fae5;color:#065f46}
.exam-item{border-left:4px solid #06d6a0;margin-bottom:10px}
.exam-item .ei-top{display:flex;justify-content:space-between}
.exam-item .ei-score{font-size:20px;font-weight:800}
.exam-item .ei-type{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;display:inline-block}
.ei-type.quiz{background:#dbeafe;color:#1e40af}.ei-type.midterm{background:#fef3c7;color:#92400e}.ei-type.final{background:#fee2e2;color:#991b1b}
.form-group{margin-bottom:14px}
.form-group label{font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;background:#fafafa}
.form-group input:focus,.form-group select:focus{border-color:#8b5cf6;background:#fff}
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row select{flex:1;padding:8px 10px;border:2px solid #e5e7eb;border-radius:10px;font-size:13px;outline:none}
</style>
</head>
<body>

<div style="background:#ff8fab;color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:700">
  🌟 学习小星球 - 小朋友的错题本和成绩记录
</div>

<div class="nav">
  <div class="item active" data-page="home" onclick="switchPage('home')"><span class="icon">🏠</span><span>首页</span></div>
  <div class="item" data-page="mistakes" onclick="switchPage('mistakes')"><span class="icon">📝</span><span>错题</span></div>
  <div class="item" data-page="exams" onclick="switchPage('exams')"><span class="icon">🏆</span><span>成绩</span></div>
  <div class="item" data-page="report" onclick="switchPage('report')"><span class="icon">📊</span><span>报告</span></div>
  <div class="item" data-page="add" onclick="switchPage('add')"><span class="icon">➕</span><span>新记录</span></div>
</div>

<div class="page active" id="pageHome">
  <div class="welcome-card">
    <div class="greeting" id="greetingText">🌟 欢迎来到学习小星球！</div>
    <div class="sub">记录错题和成绩，每天进步一点点 ✨</div>
  </div>
  <div class="section-title">📈 最近成绩</div>
  <div class="trend-grid" id="trendGrid"></div>
  <div class="section-title" style="margin-top:16px">📋 待复习错题 <span style="font-size:12px;color:#94a3b8;font-weight:400" id="reviewCount"></span></div>
  <div id="homeReviewList"></div>
</div>

<div class="page" id="pageMistakes">
  <div class="section-title">📝 错题本</div>
  <div id="mistakeList"></div>
</div>

<div class="page" id="pageExams">
  <div class="section-title">🏆 考试成绩</div>
  <div class="filter-row">
    <select id="examSubjectFilter"><option value="all">全部科目</option><option value="语文">语文</option><option value="数学">数学</option><option value="英语">英语</option></select>
    <select id="examTypeFilter"><option value="all">全部类型</option><option value="随堂测验">随堂测验</option><option value="模拟考试">模拟考试</option><option value="期中考试">期中考试</option><option value="期末考试">期末考试</option></select>
  </div>
  <div id="examList"></div>
</div>

<div class="page" id="pageReport">
  <div class="section-title">📊 学习报告</div>
  <div id="reportContent"></div>
</div>

<div class="page" id="pageAdd">
  <div class="section-title">➕ 新记录</div>
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button class="submit-btn pink" onclick="switchPage('addMistake')" style="flex:1">📸 添加错题</button>
    <button class="submit-btn green" onclick="switchPage('addExam')" style="flex:1">🏆 添加成绩</button>
  </div>
  <div id="addMistakeForm" style="display:none">
    <div class="card" style="border-top:4px solid #ff8fab">
      <div class="form-group"><label>📚 科目</label><select id="amSubject"><option>数学</option><option>语文</option><option>英语</option></select></div>
      <div class="form-group"><label>📝 题目</label><input type="text" id="amQuestion" placeholder="抄写或描述题目"></div>
      <div class="form-group"><label>✅ 正确答案</label><input type="text" id="amAnswer" placeholder="正确答案"></div>
      <div class="form-group"><label>❌ 错误原因</label><select id="amReason"><option>粗心大意</option><option>计算错误</option><option>概念不清</option><option>看错题目</option><option>不会做</option><option>其他</option></select></div>
      <button class="submit-btn pink" onclick="addMistake()">🌟 保存错题</button>
    </div>
  </div>
  <div id="addExamForm" style="display:none">
    <div class="card" style="border-top:4px solid #06d6a0">
      <div class="form-group"><label>📚 科目</label><select id="aeSubject"><option>语文</option><option>数学</option><option>英语</option></select></div>
      <div class="form-group"><label>📋 考试类型</label><select id="aeType"><option>随堂测验</option><option>模拟考试</option><option>期中考试</option><option>期末考试</option></select></div>
      <div class="form-group"><label>🏆 分数</label><input type="number" id="aeScore" placeholder="输入分数" min="0" max="100"></div>
      <div class="form-group"><label>📅 日期</label><input type="date" id="aeDate"></div>
      <div class="form-group"><label>📝 备注</label><input type="text" id="aeNote" placeholder="如：数学第3单元"></div>
      <button class="submit-btn green" onclick="addExam()">🏆 保存成绩</button>
    </div>
  </div>
</div>

<div class="page" id="pageAddMistake">
  <div class="section-title" style="cursor:pointer;font-size:14px" onclick="switchPage('add')">← 返回</div>
  <div class="card" style="border-top:4px solid #ff8fab">
    <div class="form-group"><label>📚 科目</label><select id="amSubject2"><option>数学</option><option>语文</option><option>英语</option></select></div>
    <div class="form-group"><label>📝 题目</label><input type="text" id="amQuestion2" placeholder="抄写或描述题目"></div>
    <div class="form-group"><label>✅ 正确答案</label><input type="text" id="amAnswer2" placeholder="正确答案"></div>
    <div class="form-group"><label>❌ 错误原因</label><select id="amReason2"><option>粗心大意</option><option>计算错误</option><option>概念不清</option><option>看错题目</option><option>不会做</option><option>其他</option></select></div>
    <button class="submit-btn pink" onclick="addMistake2()">🌟 保存错题</button>
  </div>
</div>

<div class="page" id="pageAddExam">
  <div class="section-title" style="cursor:pointer;font-size:14px" onclick="switchPage('add')">← 返回</div>
  <div class="card" style="border-top:4px solid #06d6a0">
    <div class="form-group"><label>📚 科目</label><select id="aeSubject2"><option>语文</option><option>数学</option><option>英语</option></select></div>
    <div class="form-group"><label>📋 考试类型</label><select id="aeType2"><option>随堂测验</option><option>模拟考试</option><option>期中考试</option><option>期末考试</option></select></div>
    <div class="form-group"><label>🏆 分数</label><input type="number" id="aeScore2" placeholder="输入分数" min="0" max="100"></div>
    <div class="form-group"><label>📅 日期</label><input type="date" id="aeDate2"></div>
    <div class="form-group"><label>📝 备注</label><input type="text" id="aeNote2" placeholder="如：数学第3单元"></div>
    <button class="submit-btn green" onclick="addExam2()">🏆 保存成绩</button>
  </div>
</div>

<div style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:24px" id="reviewOverlay">
  <div style="background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:400px">
    <h3 style="margin-bottom:12px;font-size:18px">📝 复习时间！</h3>
    <div style="font-size:20px;font-weight:700;text-align:center;padding:20px;background:#f9fafb;border-radius:14px;margin-bottom:16px" id="reviewQuestion">题目</div>
    <input type="text" id="reviewInput" placeholder="输入你的答案" style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;text-align:center;margin-bottom:12px;outline:none" onkeydown="if(event.key==='Enter')reviewCorrect()">
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;background:#fee2e2;color:#991b1b" onclick="reviewWrong()">❌ 不会</button>
      <button style="flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;background:#d1fae5;color:#065f46" onclick="reviewCorrect()">✅ 对了</button>
    </div>
  </div>
</div>

<script>
var DB={mistakes:{},exams:{}},REVIEW_IDX=-1;
function load(){try{var d=localStorage.getItem('studybook');if(d)DB=JSON.parse(d)}catch(e){}if(!DB.mistakes)DB.mistakes={};if(!DB.exams)DB.exams={}}
function save(){localStorage.setItem('studybook',JSON.stringify(DB))}
load();

// 默认用户
var U='default';
if(!DB.mistakes[U]||DB.mistakes[U].length===0){
  DB.mistakes[U]=[
    {subject:'数学',question:'36 + 47 = ?',answer:'83',reason:'进位忘记加1',date:'2026/4/20',mastered:false},
    {subject:'语文',question:'"己"和"已"是不一样的',answer:'己(全开口)已(半开口)',reason:'和"己"搞混',date:'2026/4/22',mastered:false},
    {subject:'英语',question:'apple 怎么拼？',answer:'a-p-p-l-e',reason:'少写了一个p',date:'2026/4/25',mastered:true}
  ];
  DB.exams[U]=[
    {subject:'语文',type:'期中考试',score:92,date:'2026-04-15',note:'第三单元'},
    {subject:'数学',type:'期中考试',score:88,date:'2026-04-15',note:'第三单元'},
    {subject:'英语',type:'随堂测验',score:95,date:'2026-04-22',note:'Unit 5'},
    {subject:'数学',type:'随堂测验',score:85,date:'2026-04-10',note:'计算专项'}
  ];
  save();
}

function switchPage(id){
  ['home','mistakes','exams','report','add','addMistake','addExam'].forEach(function(p){
    var e=document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1));
    if(e)e.classList.remove('active');
  });
  var t=document.getElementById('page'+id.charAt(0).toUpperCase()+id.slice(1));
  if(t)t.classList.add('active');
  document.querySelectorAll('.nav .item').forEach(function(e){e.classList.remove('active')});
  var n=document.querySelector('.nav .item[data-page="'+id+'"]');
  if(n)n.classList.add('active');
  if(id==='home')renderHome();
  if(id==='mistakes')renderMistakes();
  if(id==='exams')renderExams();
  if(id==='report')renderReport();
}

function renderHome(){
  var ms=DB.mistakes[U]||[],ex=DB.exams[U]||[];
  var grid=document.getElementById('trendGrid');
  grid.innerHTML='';
  ['语文','数学','英语'].forEach(function(s){
    var myEx=ex.filter(function(e){return e.subject===s}).sort(function(a,b){return a.date>b.date?-1:1});
    if(myEx.length===0)return;
    var last=myEx[0],prev=myEx[1],chg='<span class="change">刚起步</span>';
    if(prev)chg=last.score>prev.score?'<span class="up">↑'+(last.score-prev.score)+'</span>':'<span class="down">↓'+(prev.score-last.score)+'</span>';
    grid.innerHTML+='<div class="trend-card"><div class="subject">'+s+'</div><div class="score">'+last.score+'</div>'+chg+'</div>';
  });
  if(grid.innerHTML==='')grid.innerHTML='<div class="empty">还没有成绩哦，录一条吧~</div>';
  var t=ms.filter(function(m){return !m.mastered});
  document.getElementById('reviewCount').textContent='（还有 '+t.length+' 题）';
  var list=document.getElementById('homeReviewList');
  if(t.length===0){list.innerHTML='<div class="card" style="text-align:center;color:#94a3b8">🎉 全都掌握了，好棒！</div>';return}
  list.innerHTML='';
  t.slice(0,5).forEach(function(m){
    var i=ms.indexOf(m),sc=m.subject==='数学'?'math':m.subject==='语文'?'chinese':'english';
    list.innerHTML+='<div class="card mistake-item" onclick="openReview('+i+')"><div class="mi-top"><span class="mi-subject '+sc+'">'+m.subject+'</span><span class="badge review">待复习</span></div><div class="mi-question">'+(m.question||'📷 图片题')+'</div></div>';
  });
}

function renderMistakes(){
  var ms=DB.mistakes[U]||[],list=document.getElementById('mistakeList');
  if(ms.length===0){list.innerHTML='<div class="empty">还没有错题哦~</div>';return}
  list.innerHTML='';
  ms.forEach(function(m,i){
    var sc=m.subject==='数学'?'math':m.subject==='语文'?'chinese':'english';
    list.innerHTML+='<div class="card mistake-item" onclick="openReview('+i+')"><div class="mi-top"><span class="mi-subject '+sc+'">'+m.subject+'</span><span class="badge '+(m.mastered?'done':'review')+'">'+(m.mastered?'已掌握':'待复习')+'</span></div><div class="mi-question">'+(m.question||'📷 图片题')+'</div><div style="font-size:11px;color:#94a3b8;margin-top:4px">❌ '+m.reason+' | '+m.date+'</div></div>';
  });
}

function renderExams(){
  var ex=DB.exams[U]||[],sub=document.getElementById('examSubjectFilter').value,typ=document.getElementById('examTypeFilter').value,list=document.getElementById('examList'),f=ex.filter(function(e){return(sub==='all'||e.subject===sub)&&(typ==='all'||e.type===typ)}).sort(function(a,b){return a.date>b.date?-1:1});
  if(f.length===0){list.innerHTML='<div class="empty">没有符合条件的成绩</div>';return}
  list.innerHTML='';
  f.forEach(function(e){
    var tc='quiz';if(e.type==='模拟考试')tc='mock';if(e.type==='期中考试')tc='midterm';if(e.type==='期末考试')tc='final';
    list.innerHTML+='<div class="card exam-item"><div class="ei-top"><div><div style="font-weight:600;font-size:14px">'+e.subject+'</div><span class="ei-type '+tc+'">'+e.type+'</span></div><div class="ei-score" style="color:'+(e.score>=90?'#10b981':e.score>=80?'#f59e0b':'#ef4444')+'">'+e.score+'</div></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">📅 '+e.date+(e.note?' | '+e.note:'')+'</div></div>';
  });
}

function renderReport(){
  var ex=DB.exams[U]||[],ms=DB.mistakes[U]||[],el=document.getElementById('reportContent'),html='<div class="section-title" style="font-size:14px">📊 各科平均分</div>';
  ['语文','数学','英语'].forEach(function(s){
    var fex=ex.filter(function(e){return e.subject===s});
    if(fex.length===0){html+='<div class="card" style="padding:12px;margin-bottom:8px"><div style="font-size:12px;color:#64748b;font-weight:600">'+s+'</div><div style="color:#94a3b8;font-size:13px">暂无数据</div></div>';return}
    var avg=Math.round(fex.reduce(function(a,b){return a+b.score},0)/fex.length);
    var c={语文:'#ff8fab',数学:'#4cc9f0',英语:'#06d6a0'};
    html+='<div class="card" style="padding:12px;margin-bottom:8px"><div style="font-size:12px;color:#64748b;font-weight:600">'+s+'（共'+fex.length+'次）</div><div style="font-size:16px;font-weight:700;margin:4px 0">'+avg+'分</div><div class="r-bar" style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden"><div class="fill" style="height:100%;border-radius:4px;width:'+avg+'%;background:'+c[s]+'"></div></div></div>';
  });
  var mastered=ms.filter(function(m){return m.mastered}).length;
  html+='<div class="section-title" style="font-size:14px;margin-top:16px">❌ 错题分析</div><div class="card" style="padding:12px;margin-bottom:8px"><div style="font-size:12px;color:#64748b;font-weight:600">掌握进度</div><div style="font-size:14px;margin:4px 0">已掌握 '+mastered+'/'+ms.length+' 题（'+Math.round(mastered/ms.length*100||0)+'%）</div><div class="r-bar" style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden"><div class="fill" style="height:100%;border-radius:4px;width:'+(mastered/ms.length*100||0)+'%;background:#10b981"></div></div></div>';
  var reasons={};ms.forEach(function(m){if(!reasons[m.reason])reasons[m.reason]=0;reasons[m.reason]++});
  if(Object.keys(reasons).length>0){html+='<div class="card" style="padding:12px;margin-bottom:8px"><div style="font-size:12px;color:#64748b;font-weight:600">高频错误原因</div>';Object.keys(reasons).sort(function(a,b){return reasons[b]-reasons[a]}).slice(0,3).forEach(function(r){html+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f1f5f9"><span>❌ '+r+'</span><span style="font-weight:700">'+reasons[r]+'次</span></div>'});html+='</div>'}
  if(ex.length===0)html='<div class="empty">录入一些成绩，报告自动生成~</div>';el.innerHTML=html;
}

function addMistake(){var q=document.getElementById('amQuestion2').value.trim(),a=document.getElementById('amAnswer2').value.trim(),sub=document.getElementById('amSubject2').value,reason=document.getElementById('amReason2').value;if(!q&&!a){alert('至少填题目或答案哦~');return}var ms=DB.mistakes[U]||[];ms.unshift({subject:sub,question:q,answer:a,reason:reason,date:new Date().toLocaleDateString('zh-CN'),mastered:false});DB.mistakes[U]=ms;save();document.getElementById('amQuestion2').value='';document.getElementById('amAnswer2').value='';switchPage('mistakes')}
function addExam(){var score=parseInt(document.getElementById('aeScore2').value);if(isNaN(score)||score<0||score>100){alert('请输入0-100之间的分数哦~');return}var sub=document.getElementById('aeSubject2').value,typ=document.getElementById('aeType2').value,date=document.getElementById('aeDate2').value||new Date().toISOString().slice(0,10),note=document.getElementById('aeNote2').value.trim(),ex=DB.exams[U]||[];ex.push({subject:sub,type:typ,score:score,date:date,note:note});DB.exams[U]=ex;save();document.getElementById('aeScore2').value='';document.getElementById('aeNote2').value='';switchPage('exams')}
function addMistake2(){return addMistake()}
function addExam2(){return addExam()}

function openReview(idx){REVIEW_IDX=idx;var m=DB.mistakes[U][idx];document.getElementById('reviewQuestion').textContent=m.question||'📷 图片题';document.getElementById('reviewInput').value='';document.getElementById('reviewOverlay').style.display='flex';setTimeout(function(){document.getElementById('reviewInput').focus()},200)}
function markReview(done){var ms=DB.mistakes[U];if(REVIEW_IDX>=0&&REVIEW_IDX<ms.length){if(done)ms[REVIEW_IDX].mastered=true;ms[REVIEW_IDX].reviewCount=(ms[REVIEW_IDX].reviewCount||0)+1;ms[REVIEW_IDX].lastReview=Date.now();save()}document.getElementById('reviewOverlay').style.display='none';renderHome();renderMistakes();REVIEW_IDX=-1}
function reviewCorrect(){markReview(true)}
function reviewWrong(){markReview(false)}

document.addEventListener('DOMContentLoaded',function(){
  ['examSubjectFilter','examTypeFilter'].forEach(function(id){
    document.getElementById(id).addEventListener('change',renderExams);
  });
  renderHome();
});
</script>
