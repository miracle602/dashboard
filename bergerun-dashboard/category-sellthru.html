function init(){
    const tsq=DATA.reduce((a,r)=>a+r[2],0), tsa=DATA.reduce((a,r)=>a+r[4],0), tsamt=DATA.reduce((a,r)=>a+r[6],0);
    const catN=DATA.filter(r=>r[2]>0).length;
    document.getElementById('summary').innerHTML=
        '<div class="kpi"><div class="num">'+catN+'</div><div class="label">品类数</div></div>'+
        '<div class="kpi"><div class="num">'+tsq.toLocaleString()+'</div><div class="label">预计库存(件)</div></div>'+

        '<div class="kpi"><div class="num green">¥'+tsamt.toLocaleString()+'</div><div class="label">成交金额</div></div>'+
        '<div class="kpi"><div class="num purple">'+(tsa/(tsq+tsa)*100).toFixed(2)+'%</div><div class="label">总体售罄</div></div>';
    
    const top=DATA.filter(r=>r[2]>0).sort((a,b)=>b[2]-a[2]).slice(0,15);
    ech1('chart1','库存TOP15',top.map(r=>r[1]||r[0]||'(未分类)'),top.map(r=>r[2]),'#3498db');
    
    const cats={};DATA.forEach(r=>{if(r[0])cats[r[0]]=(cats[r[0]]||0)+r[2]});
    const pie=Object.entries(cats).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({name:k,value:v}));
    ech2('chart2','大类库存占比',pie);
    
    const tb=document.getElementById('tbody');
    DATA.forEach((r,i)=>{
        let row='<tr'+(i===0?' class="row-0"':'')+'>';
        r.forEach((v,j)=>{
            if(j===7){var cls=v>=5?'sr-high':v>=1?'sr-mid':'sr-low';row+='<td class="'+cls+'">'+v+'%</td>';}
            else if(j===8){var cls=v>=70?'disc':v>=60?'sr-mid':'disc-low';row+='<td class="'+cls+'">'+(v?v+'%':'')+'</td>';}
            else row+='<td>'+(typeof v==='number'?v.toLocaleString():v||'')+'</td>';
        });
        row+='</tr>';tb.innerHTML+=row;
    });
}
function ech1(id,t,x,y,c){var e=echarts.init(document.getElementById(id));e.setOption({title:{text:t,left:'center',textStyle:{fontSize:13}},tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},grid:{left:'3%',right:'4%',bottom:'15%'},xAxis:{type:'category',data:x,axisLabel:{rotate:35,fontSize:10}},yAxis:{type:'value'},series:[{type:'bar',data:y,itemStyle:{color:c},barMaxWidth:30}]});window.addEventListener('resize',function(){e.resize()});}
function ech2(id,t,data){var e=echarts.init(document.getElementById(id));e.setOption({title:{text:t,left:'center',textStyle:{fontSize:13}},tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},series:[{type:'pie',data:data,radius:['15%','55%'],center:['50%','55%'],label:{formatter:'{b}'},emphasis:{itemStyle:{shadowBlur:10}}}]});window.addEventListener('resize',function(){e.resize()});}
