function exportExcel(){{
    var c="\uFEFF"+H.join(",")+"\n";
    for(var i=0;i<F.length;i++){{var r=F[i];var row=[];
        for(var j=0;j<r.length;j++){{var v=r[j];

            else row.push('"'+v.replace(/"/g,'""')+'"');
        }}c+=row.join(",")+"\n";
    }}
    var b=new Blob([c],{{type:'text/csv;charset=utf-8;'}});
    var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='{name}.csv';a.click();
}}
function go(){{
    var q=document.getElementById('search').value;
    if(!q){{F=D;}}else{{F=[];for(var i=0;i<D.length;i++){{if(D[i][2].indexOf(q)>-1)F.push(D[i]);}}}}
    var tb=document.getElementById('tbody');tb.innerHTML='';
    for(var i=0;i<F.length;i++){{var r=F[i];var h='<tr>';
        for(var j=0;j<r.length;j++){{var v=r[j];
            if(typeof v==='number'){{h+='<td class="num">'+(v===Math.floor(v)?v.toLocaleString():v.toFixed(2))+'</td>';}}

        }}h+='</tr>';tb.innerHTML+=h;

}}
