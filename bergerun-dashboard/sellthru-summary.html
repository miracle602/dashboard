// 初始化筛选器选项
function initFilters() {
  const catSelect = document.getElementById('categoryFilter');
  CATEGORIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catSelect.appendChild(opt);
  });
  
  const seasonSelect = document.getElementById('seasonFilter');
  SEASONS.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    seasonSelect.appendChild(opt);
  });
  
  // 性别
  const genders = [...new Set(DATA.map(r => r[COL_GENDER]).filter(v => v))];
  const genderSelect = document.getElementById('genderFilter');
  genders.sort().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    genderSelect.appendChild(opt);
  });
  
  document.getElementById('totalCount').textContent = DATA.length;
}

// 渲染表头
function renderHead() {
  const thead = document.getElementById('tableHead');
  thead.innerHTML = '';
  
  // 只显示基本列（前BASE_COLS列，但跳过图片列）
  const displayCols = [];
  for (let i = 0; i < BASE_COLS; i++) {
    if (i === COL_PIC) continue; // 跳过图片列
    displayCols.push(i);
  }
  // 加入周数据列（从BASE_COLS开始）
  for (let i = BASE_COLS; i < HEADERS.length; i++) {
    displayCols.push(i);
  }
  
  window.DISPLAY_COLS = displayCols;
  
  // 第一行表头（大类分组）
  const tr1 = document.createElement('tr');
  tr1.className = 'thead-main';
  
  // 基本信息列合并
  const th_basic = document.createElement('th');
  th_basic.colSpan = displayCols.filter(i => i < BASE_COLS).length;
  th_basic.textContent = '基本信息';
  th_basic.style.borderRight = '3px solid #4a90e2';
  tr1.appendChild(th_basic);
  
  // 周数据列标题（年份行已有 2026）
  const weekDisplayCols = displayCols.filter(i => i >= BASE_COLS);
  if (weekDisplayCols.length > 0) {
    const th_week = document.createElement('th');
    th_week.colSpan = weekDisplayCols.length;
    th_week.textContent = '2026年 周销量数据';
    th_week.style.background = '#0f3460';
    tr1.appendChild(th_week);
  }
  
  thead.appendChild(tr1);
  
  // 第二行：具体列名
  const tr2 = document.createElement('tr');
  tr2.className = 'thead-sub';
  
  displayCols.forEach((colIdx, pos) => {
    const th = document.createElement('th');
    const h = HEADERS[colIdx];
    // 使用更细化的h2标题，如果与h1相同则只显示一个
    th.textContent = h.h2 && h.h2 !== h.h1 ? h.h2 : h.h1;
    th.dataset.col = colIdx;
    th.dataset.pos = pos;
    
    if (colIdx < BASE_COLS) {
      th.style.borderRight = pos === displayCols.filter(i => i < BASE_COLS).length - 1 ? '3px solid #4a90e2' : '';
    } else {
      th.style.minWidth = '56px';
    }
    
    th.addEventListener('click', () => sortBy(colIdx));
    tr2.appendChild(th);
  });
  
  thead.appendChild(tr2);
}

let sortCol = -1;
let sortDir = 1;

function sortBy(colIdx) {
  if (sortCol === colIdx) {
    sortDir = -sortDir;
  } else {
    sortCol = colIdx;
    sortDir = -1; // 默认降序
  }
  applyFilters();
  
  // 更新排序标记
  document.querySelectorAll('.thead-sub th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (parseInt(th.dataset.col) === colIdx) {
      th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

// 获取售罄率颜色
function getPctColor(pct) {
  if (pct === null || pct === '' || isNaN(pct)) return '';
  const v = parseFloat(pct);
  if (v >= 0.9) return '#d4380d'; // 高售罄率-红
  if (v >= 0.8) return '#cf1322'; 
  if (v >= 0.7) return '#fa541c';
  if (v >= 0.5) return '#fa8c16';
  if (v >= 0.3) return '#52c41a'; // 低售罄率-绿
  return '#13c2c2';
}

function getPctBg(pct) {
  if (pct === null || pct === '' || isNaN(pct)) return '';
  const v = parseFloat(pct);
  if (v >= 0.9) return '#fff1f0';
  if (v >= 0.8) return '#fff1f0';
  if (v >= 0.7) return '#fff7e6';
  if (v >= 0.5) return '#fffbe6';
  return '#f6ffed';
}

function getWeekBg(val) {
  if (!val || isNaN(val)) return '';
  const v = parseFloat(val);
  if (v <= 0) return '';
  if (v >= 100) return 'rgba(207,19,34,0.15)';
  if (v >= 50) return 'rgba(250,84,28,0.12)';
  if (v >= 20) return 'rgba(250,140,22,0.1)';
  if (v >= 5) return 'rgba(82,196,26,0.08)';
  return '';
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const season = document.getElementById('seasonFilter').value;
  const gender = document.getElementById('genderFilter').value;
  const pctOpt = document.getElementById('pctFilter').value;
  
  let filtered = DATA.filter(row => {
    if (search && !String(row[COL_SKU] || '').toLowerCase().includes(search)) return false;
    if (cat && String(row[COL_CAT] || '') !== cat) return false;
    if (season && String(row[COL_SEASON] || '') !== season) return false;
    if (gender && String(row[COL_GENDER] || '') !== gender) return false;
    if (pctOpt) {
      const pct = parseFloat(row[COL_PCT]);
      const threshold = parseFloat(pctOpt);
      if (threshold < 0) {
        if (isNaN(pct) || pct >= Math.abs(threshold)) return false;
      } else {
        if (isNaN(pct) || pct < threshold) return false;
      }
    }
    return true;
  });
  
  // 排序
  if (sortCol >= 0) {
    filtered.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va === null || va === '') va = sortDir === 1 ? Infinity : -Infinity;
      if (vb === null || vb === '') vb = sortDir === 1 ? Infinity : -Infinity;
      const na = parseFloat(va), nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
      return String(va).localeCompare(String(vb), 'zh-CN') * sortDir;
    });
  }
  
  // 统计
  const totalSales = filtered.reduce((s, r) => s + (parseFloat(r[COL_SOLD]) || 0), 0);
  const pctVals = filtered.map(r => parseFloat(r[COL_PCT])).filter(v => !isNaN(v));
  const avgPct = pctVals.length ? (pctVals.reduce((s,v) => s+v, 0) / pctVals.length) : null;
  
  document.getElementById('filteredCount').textContent = filtered.length;
  document.getElementById('totalSales').textContent = totalSales > 0 ? totalSales.toLocaleString() : '-';
  document.getElementById('avgPct').textContent = avgPct !== null ? (avgPct * 100).toFixed(1) + '%' : '-';
  
  renderBody(filtered);
}

function renderBody(rows) {
  const tbody = document.getElementById('tableBody');
  const noData = document.getElementById('noData');
  
  if (rows.length === 0) {
    tbody.innerHTML = '';
    noData.style.display = 'block';
    return;
  }
  noData.style.display = 'none';
  
  const displayCols = window.DISPLAY_COLS;
  const baseCols = displayCols.filter(i => i < BASE_COLS);
  
  const fragment = document.createDocumentFragment();
  
  rows.forEach((row, idx) => {
    const tr = document.createElement('tr');
    if (idx % 2 === 1) tr.classList.add('alt');
    
    displayCols.forEach((colIdx, pos) => {
      const td = document.createElement('td');
      const val = row[colIdx];
      const valStr = val === null || val === undefined ? '' : String(val);
      
      // 固定列
      if (colIdx === COL_SKU) {
        td.className = 'col-fixed col-fixed-0';
        td.style.fontWeight = '500';
        td.style.color = '#1a5eb8';
      } else if (colIdx === COL_CAT) {
        td.className = 'col-fixed col-fixed-2';
      } else if (colIdx === COL_GENDER) {
        td.className = 'col-fixed col-fixed-3 center';
      }
      
      // 售罄率列特殊渲染
      if (colIdx === COL_PCT) {
        const pct = parseFloat(valStr);
        td.className = 'pct-cell';
        td.style.color = getPctColor(valStr);
        td.style.background = getPctBg(valStr);
        td.textContent = isNaN(pct) ? valStr : (pct * 100).toFixed(1) + '%';
        tr.appendChild(td);
        return;
      }
      
      // 数字列
      if (colIdx >= COL_DAYS && colIdx <= COL_REMAIN && colIdx !== COL_ON_DATE && colIdx !== COL_SELL_DATE) {
        td.className = 'num';
        if (colIdx === COL_AVG_DAILY) {
          td.textContent = isNaN(parseFloat(valStr)) ? valStr : parseFloat(valStr).toFixed(1);
        } else if (colIdx === COL_AVG_PRICE) {
          td.textContent = isNaN(parseFloat(valStr)) ? valStr : parseFloat(valStr).toFixed(1);
        } else if (colIdx === COL_AMOUNT || colIdx === COL_AMOUNT2) {
          const n = parseFloat(valStr);
          td.textContent = isNaN(n) ? valStr : n.toLocaleString('zh-CN', {minimumFractionDigits:0, maximumFractionDigits:0});
        } else {
          const n = parseFloat(valStr);
          td.textContent = isNaN(n) ? valStr : n.toLocaleString('zh-CN');
        }
        tr.appendChild(td);
        return;
      }
      
      // 周数据列
      if (colIdx >= BASE_COLS) {
        td.className = 'week-cell num';
        const n = parseFloat(valStr);
        if (!isNaN(n) && n > 0) {
          td.textContent = n.toLocaleString('zh-CN');
          td.style.background = getWeekBg(valStr);
        } else {
          td.textContent = valStr || '';
          td.style.color = '#bbb';
        }
        tr.appendChild(td);
        return;
      }
      
      td.textContent = valStr;
      tr.appendChild(td);
    });
    
    fragment.appendChild(tr);
  });
  
  tbody.innerHTML = '';
  tbody.appendChild(fragment);
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('categoryFilter').value = '';
  document.getElementById('seasonFilter').value = '';
  document.getElementById('genderFilter').value = '';
  document.getElementById('pctFilter').value = '';
  sortCol = -1;
  sortDir = 1;
  document.querySelectorAll('.thead-sub th').forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
  applyFilters();
}

// 监听输入
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('seasonFilter').addEventListener('change', applyFilters);
document.getElementById('genderFilter').addEventListener('change', applyFilters);
document.getElementById('pctFilter').addEventListener('change', applyFilters);

// 初始化
initFilters();
renderHead();
applyFilters();
</script>
