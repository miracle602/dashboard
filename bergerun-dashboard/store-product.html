<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门店商品专用数据管控</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;font-size:12px;background:#fff;padding:0 2px;color:#333}
.sfbar{display:flex;flex-wrap:wrap;align-items:center;gap:4px 6px;padding:6px 10px;background:#2b5797;border-radius:0;margin-bottom:0;position:relative}
.sfbar label{font-size:11px;color:#fff;white-space:nowrap}
.sfbar select,.sfbar input[type=text]{padding:2px 4px;font-size:11px;border:1px solid #3b6db5;border-radius:2px;height:22px;background:#fff;outline:none}
.sfbar select{min-width:68px;max-width:90px}
.sfbar .kw-wrap{display:inline-flex;align-items:center;position:relative}
.sfbar .kw-wrap input[type=text]{width:100px}
.sfbar .kw-btn{width:22px;height:22px;border:1px solid #3b6db5;border-left:none;background:#3b6db5;color:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;border-radius:0 2px 2px 0;padding:0}
.sfbar .kw-btn:hover{background:#4a7dd4}
.sfbar button{padding:1px 12px;font-size:11px;border-radius:2px;cursor:pointer;height:22px}
.sfbar .qbtn{background:#357ae8;color:#fff;border:1px solid #357ae8}
.sfbar .ebtn{background:#4caf50;color:#fff;border:1px solid #388e3c}
.sfbar .cbtn{background:#fff;color:#333;border:1px solid #8ab4f8}
.stat{font-size:11px;color:#6b7280;padding:3px 6px 0}
.table-wrapper{overflow-x:auto}
table{border-collapse:collapse;width:max-content;min-width:100%;font-size:11px}
th,td{border:1px solid #d1d5db;padding:4px 6px;text-align:center;white-space:nowrap;line-height:1.4}
.header-row th{background:#1d4ed8;color:#fff;font-weight:600;font-size:11px;letter-spacing:0.3px;position:sticky;top:0;z-index:10}
.header-row th:nth-child(-n+12){background:#1e3a8a}
.data-row-odd td{background:#f8faff}
.data-row-even td{background:#eef2fb}
tr:hover td{background:#dbeafe!important}
td:not(:empty){font-weight:500}
td.num{color:#1d4ed8;font-weight:600}
.pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;padding:4px 0;flex-wrap:wrap}
.pager .pi{padding:2px 8px;border:1px solid #d9d9d9;border-radius:3px;font-size:11px;cursor:pointer;background:#fff}
.pager .pi:hover{border-color:#1890ff;color:#1890ff}
.pager .pi.disabled{opacity:0.4;cursor:default}
.pager .info{font-size:11px;color:#8c8c8c}
.pager select{padding:2px 4px;border:1px solid #d9d9d9;border-radius:3px;font-size:11px}
.fp-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:9998;display:flex;align-items:center;justify-content:center}
.fp-panel{background:#fff;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.2);width:320px;max-height:80vh;overflow-y:auto;padding:16px}
.fp-title{font-size:14px;font-weight:600;color:#1d4ed8;margin-bottom:12px}
.fp-group{margin-bottom:14px}
.fp-label{font-size:12px;color:#555;font-weight:500;margin-bottom:6px}
.fp-check-list{display:flex;flex-wrap:wrap;gap:6px}
.fp-check-list label{font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 8px;border:1px solid #e5e7eb;border-radius:3px;background:#f9fafb;user-select:none}
.fp-check-list label:hover{border-color:#3b82f6;background:#eff6ff}
.fp-check-list input{margin:0}
.fp-actions{display:flex;gap:8px;margin-top:4px}
.fp-actions button{padding:5px 20px;border-radius:3px;font-size:12px;cursor:pointer;border:1px solid #d9d9d9;background:#fff}
.fp-ok{background:#357ae8!important;color:#fff;border-color:#357ae8!important}
.fp-cl{color:#888}
</style>
</head>
<body>
<div class="sfbar">
<label>品牌</label><select id="sf_BRAND" onchange="doFilter()"/>
<label>处份</label><select id="sf_DEPT" onchange="doFilter()"/>
<label>年份</label><select id="sf_YEAR" onchange="doFilter()"/>
<label>季节</label><select id="sf_SEASON" onchange="doFilter()"/>
<label>款式</label><select id="sf_STYLE" onchange="doFilter()"/>
<label>款号</label><div class="kw-wrap"><input type="text" id="kw" placeholder="" oninput="doFilter()"><button class="kw-btn" onclick="showFilterPanel()" title="品牌/处份筛选">▼</button></div>
<label>波次</label><select id="sf_BODUAN" onchange="doFilter()"/>
<button class="qbtn" onclick="doFilter()">查询</button>
<button class="ebtn" onclick="exportCSV()">CSV</button>
<button class="cbtn" onclick="clearAll()">清空</button>
</div>
<div class="stat" id="stat">共 2 条记录，106 列</div>
<div class="table-wrapper"><table id="tbl">
<thead id="thx"></thead>
<tbody id="tb"></tbody>
</table></div>
<div class="pager" id="pager"></div>

<script>
var ALL = [["云南南涧恩瑞妮（新）", "加盟ZC", "2026", "春", "衬衫", "M61C155", "无花果色", 599.0, "二波", null, null, null, "", "", "", "", "", "", "", null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, "0%", null, null, null, null, null, null, null, null, 1.0, 1.0, 0.0, null, null, 2.0, null, 1.0, 1.0, null, null, null, 2.0, 2.0, "", 1.0, 1.0, "", "", 4.0, null], ["云南南涧恩瑞妮（新）", "加盟ZC", "2026", "春", "衬衫", "M61C158", "雪球白", 499.0, "一波", null, null, null, "", "", "", "", "", "", "", null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, "0%", null, null, null, null, null, null, null, null, null, 0.0, 0.0, null, null, 0.0, null, null, null, null, null, null, 0.0, "", "", "", "", "", "", 0.0, null]];
var NCOLS = 106;
var fState = {};
var filtered = [];
var page = 1, ps = 50;
var brandValues = ['恩瑞妮','朗文斯汀','帛逸','帛卡袖','思朋','施喆','婉甸'];
var deptValues = ['服装','鞋','配饰品','道具'];

function V(d,c){ return d[c]!=null?String(d[c]):'(空白)'; }

function fillSel(id, vals){
  var el = document.getElementById(id); if(!el) return;
  var html = '<option value="">全部</option>';
  for(var i=0;i<vals.length;i++) html += '<option value="'+vals[i]+'">'+vals[i]+'</option>';
  el.innerHTML = html;
}
function fillByData(id, col){
  var el = document.getElementById(id); if(!el) return;
  var s={}; for(var i=0;i<ALL.length;i++){var v=ALL[i][col];if(v!=null&&v!=='')s[v]=1;}
  var keys = Object.keys(s).sort();
  var html = '<option value="">全部</option>';
  for(var i=0;i<keys.length;i++) html += '<option value="'+keys[i].replace(/"/g,'&quot;')+'">'+keys[i]+'</option>';
  el.innerHTML = html;
}

(function(){
  var FW = [130,55,55,55,90,90,55,55,55,55,100,65];
  var H1 = ['店仓名称','店仓类别','年份','季节','品名','款号','颜色','吊牌价','波段','主推款','单店单款单色零售排名','到店天数'];
  var SZ = ['XS','S','M','L','XL','2XL','合计'];
  var r0 = '<tr class="header-row">';
  for(var i=0;i<12;i++) r0 += '<th rowspan="2" style="min-width:'+FW[i]+'px">'+H1[i]+'</th>';
  r0 += '<th colspan="7">期初订单</th><th colspan="7">订单进货（订单，正常）</th><th colspan="7">换货进货</th>';
  r0 += '<th colspan="7">补货，调货进货</th><th colspan="7">退货数量</th><th colspan="7">调出</th>';
  r0 += '<th colspan="7">实际发货数量</th><th colspan="7">累计销售</th>';
  r0 += '<th rowspan="2">平均折扣</th><th colspan="7">周销</th><th rowspan="2">售罄率</th>';
  r0 += '<th colspan="7">店铺期未库存</th><th colspan="7">总仓库存</th><th colspan="7">建议补货</th><th colspan="7">与总公司补货建议</th><th rowspan="2"> </th></tr>';
  var r1 = '<tr class="header-row">';
  for(var g=0;g<13;g++) for(var j=0;j<7;j++) r1 += '<th>'+SZ[j]+'</th>';
  r1 += '</tr>';
  document.getElementById('thx').innerHTML = r0+r1;

  fillSel('sf_BRAND', brandValues);
  fillSel('sf_DEPT', deptValues);
  fillByData('sf_YEAR',2);
  fillByData('sf_SEASON',3);
  fillByData('sf_STYLE',4);
  fillByData('sf_BODUAN',8);
})();

function doFilter(){
  var kw=document.getElementById('kw').value.trim().toLowerCase();
  var sfBr=document.getElementById('sf_BRAND'),sfDp=document.getElementById('sf_DEPT');
  var sfYr=document.getElementById('sf_YEAR'),sfSs=document.getElementById('sf_SEASON');
  var sfSt=document.getElementById('sf_STYLE'),sfBd=document.getElementById('sf_BODUAN');
  filtered = ALL.filter(function(d){
    if(sfBr&&sfBr.value&&V(d,0)!==sfBr.value)return false;
    if(sfDp&&sfDp.value&&V(d,1)!==sfDp.value)return false;
    if(sfYr&&sfYr.value&&V(d,2)!==sfYr.value)return false;
    if(sfSs&&sfSs.value&&V(d,3)!==sfSs.value)return false;
    if(sfSt&&sfSt.value&&V(d,4)!==sfSt.value)return false;
    if(sfBd&&sfBd.value&&V(d,8)!==sfBd.value)return false;
    if(kw){ for(var c=0;c<d.length;c++){ if(d[c]!=null&&String(d[c]).toLowerCase().indexOf(kw)>=0) return true; } return false; }
    return true;
  });
  page=1; render();
}

function render(){
  var total=filtered.length, tp=Math.max(1,Math.ceil(total/ps));
  if(page>tp) page=tp; var start=(page-1)*ps, end=Math.min(start+ps,total);
  var tb=document.getElementById('tb'); tb.innerHTML='';
  for(var i=start;i<end;i++){
    var d=filtered[i];
    var tr=document.createElement('tr'); tr.className=i%2===0?'data-row-odd':'data-row-even';
    for(var c=0;c<NCOLS;c++){
      var td=document.createElement('td'); var v=d[c];
      if(v!=null&&v!==''){
        if(typeof v==='number'){ td.className='num'; td.textContent=v===Math.floor(v)?v:v.toFixed(2); }
        else{ if(c===5){td.style.color='#1890ff';td.style.fontWeight='600'} td.textContent=v; }
      }
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
  document.getElementById('stat').textContent='共 '+total+' 条记录，106 列';
  var p=document.getElementById('pager'); p.innerHTML='';
  if(total<=ps&&tp<=1)return;
  var h='<select onchange="cPs(this.value)"><option value=20>20条/页</option><option value=50 selected>50条/页</option><option value=100>100条/页</option><option value=200>200条/页</option></select>';
  h+='<span class=pi'+(page<=1?' disabled':'')+' onclick="goP(1)">首页</span>';
  h+='<span class=pi'+(page<=1?' disabled':'')+' onclick="goP('+(page-1)+')">‹</span>';
  h+='<span class=info> 第'+page+'/'+tp+'页 </span>';
  h+='<span class=pi'+(page>=tp?' disabled':'')+' onclick="goP('+(page+1)+')">›</span>';
  h+='<span class=pi'+(page>=tp?' disabled':'')+' onclick="goP('+tp+')">末页</span>';
  p.innerHTML=h;
}
function goP(p){page=p;render();}
function cPs(v){ps=parseInt(v);page=1;render();}
function clearAll(){
  fState={};
  document.getElementById('kw').value='';
  ['sf_BRAND','sf_DEPT','sf_YEAR','sf_SEASON','sf_STYLE','sf_BODUAN'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  doFilter();
}
function exportCSV(){
  var csv=[];
  var h1=[]; document.querySelectorAll('#thx tr:first-child th').forEach(function(t){h1.push(t.textContent.trim().replace(/,/g,''));}); csv.push(h1.join(','));
  var h2=[]; document.querySelectorAll('#thx tr:last-child th').forEach(function(t){h2.push(t.textContent.trim().replace(/,/g,''));}); csv.push(h2.join(','));
  for(var i=0;i<filtered.length;i++){ var r=[]; for(var c=0;c<NCOLS;c++) r.push((''+(filtered[i][c]!=null?filtered[i][c]:'')).replace(/,/g,'')); csv.push(r.join(',')); }
  var b=new Blob(['\ufeff'+csv.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='门店商品数据管控.csv';a.click();
}
function showFilterPanel(){
  closeFp();
  var overlay = document.createElement('div'); overlay.className='fp-overlay'; overlay.onclick=closeFp;
  var panel = document.createElement('div'); panel.className='fp-panel';
  panel.onclick=function(e){e.stopPropagation();};
  var html = '<div class="fp-title">筛选条件</div>';
  html += '<div class="fp-group"><div class="fp-label">品牌</div><div class="fp-check-list">';
  for(var i=0;i<brandValues.length;i++){
    var chk = fState.brand && fState.brand.indexOf(brandValues[i])>=0 ? ' checked' : '';
    html += '<label><input type="checkbox" name="fp_brand" value="'+brandValues[i]+'"'+chk+'>'+brandValues[i]+'</label>';
  }
  html += '</div></div>';
  html += '<div class="fp-group"><div class="fp-label">处份（部门）</div><div class="fp-check-list">';
  for(var i=0;i<deptValues.length;i++){
    var chk = fState.dept && fState.dept.indexOf(deptValues[i])>=0 ? ' checked' : '';
    html += '<label><input type="checkbox" name="fp_dept" value="'+deptValues[i]+'"'+chk+'>'+deptValues[i]+'</label>';
  }
  html += '</div></div>';
  html += '<div class="fp-actions"><button class="fp-ok" onclick="fpApply()">确定</button><button class="fp-cl" onclick="fpClear()">清除筛选</button></div>';
  panel.innerHTML = html;
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}
function fpApply(){
  var brands = []; document.querySelectorAll('input[name="fp_brand"]:checked').forEach(function(e){brands.push(e.value);});
  var depts = []; document.querySelectorAll('input[name="fp_dept"]:checked').forEach(function(e){depts.push(e.value);});
  fState.brand = (brands.length>0&&brands.length<brandValues.length) ? brands : undefined;
  fState.dept = (depts.length>0&&depts.length<deptValues.length) ? depts : undefined;
  closeFp(); doFilter();
}
function fpClear(){ delete fState.brand; delete fState.dept; closeFp(); doFilter(); }
function closeFp(){
  var o = document.querySelector('.fp-overlay'); if(o){document.body.removeChild(o);}
}
filtered=ALL.slice();render();
</script>
</body>
</html>
