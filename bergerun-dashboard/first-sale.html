<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>第一次销售日期</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:#f5f6fa;padding:15px;color:#333}
.header{background:#1a1a2e;color:#fff;padding:15px 20px;border-radius:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px}.header p{font-size:12px;color:#aaa;margin-top:3px}
.btn-export{background:#27ae60;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:13px}
.btn-back{background:#555;color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;text-decoration:none;margin-right:8px}
.summary{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.kpi{background:#fff;padding:10px 15px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center;flex:1;min-width:100px}
.kpi .num{font-size:20px;font-weight:700;color:#1a1a2e}.kpi .label{font-size:11px;color:#888;margin-top:2px}
.controls{margin-bottom:10px}.controls input{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;width:300px}
.table-wrap{background:#fff;border-radius:8px;padding:10px;overflow:auto;max-height:78vh}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1a2e;color:#fff;padding:6px 8px;text-align:center;position:sticky;top:0;z-index:1}
td{padding:4px 8px;text-align:center;border-bottom:1px solid #eee}
tr:hover{background:#eef2ff}
</style></head><body>
<div class="header">
<div><h1>第一次销售日期</h1><p>7个货号 · Q2首次开单日期</p></div>
<div><a class="btn-back" href="index.html">← 返回</a><button class="btn-export" onclick="exportExcel()">⬇ 导出Excel</button></div>
</div>
<div class="summary" id="kpi"></div>
<div class="controls"><input id="search" placeholder="搜索货号..." oninput="go()"></div>
<div class="table-wrap"><table><thead><tr><th>货号</th><th>品名</th><th>日期</th><th>日期转换</th></tr></thead><tbody id="tbody"></tbody></table></div>
<script>
var D=[["1083", "套装", "20260402", "2026-04-02"], ["1295", "微喇裤", "20260402", "2026-04-02"], ["632", "连衣裙", "20260402", "2026-04-02"], ["2", "裤子", "20260413", "2026-04-13"], ["3", "裤子", "20260413", "2026-04-13"], ["142683", "休闲裤子", "20260414", "2026-04-14"], ["116084", "其他", "20260416", "2026-04-16"]];
var F=D;
function exportExcel(){
    var csv="\uFEFF货号,品名,日期,日期转换\n";
    for(var i=0;i<F.length;i++){var r=F[i];csv+='"'+r[0].replace(/"/g,'""')+'","'+r[1].replace(/"/g,'""')+'",'+r[2]+','+r[3]+'\n';}
    var b=new Blob([csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='第一次销售日期.csv';a.click();
}
function go(){
    var q=document.getElementById('search').value;
    if(!q){F=D;}else{F=[];for(var i=0;i<D.length;i++){if(D[i][0].indexOf(q)>-1||D[i][1].indexOf(q)>-1)F.push(D[i]);}}
    var tb=document.getElementById('tbody');tb.innerHTML='';
    for(var i=0;i<F.length;i++){var r=F[i];tb.innerHTML+='<tr><td>'+r[0]+'</td><td style="text-align:left">'+r[1]+'</td><td>'+r[2]+'</td><td>'+r[3]+'</td></tr>';}
}
document.getElementById('kpi').innerHTML='<div class="kpi"><div class="num">'+D.length+'</div><div class="label">货号数</div></div>';
go();
</script></body></html>
