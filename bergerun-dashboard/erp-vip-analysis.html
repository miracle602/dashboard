.kpi-card .kl{font-size:10px;color:#64748b;margin-bottom:2px}.kpi-card .kv{font-size:18px;font-weight:700}.kpi-card .ks{font-size:10px;color:#94a3b8;margin-top:2px}

.card .ct{font-size:13px;font-weight:600;margin-bottom:8px;padding-left:8px;border-left:3px solid #f5576c}
.ct-blue{border-left-color:#4361ee}
table{width:100%;border-collapse:collapse;font-size:11px}

.text-right{text-align:right}
.total-row{background:#fdf2f8!important;font-weight:600}.total-row td{border-top:2px solid #f5576c}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
@media(max-width:768px){.chart-row{grid-template-columns:1fr}}
footer{text-align:center;font-size:10px;color:#94a3b8;padding:16px 0}

<script>
function fmt(n){return n.toLocaleString('zh-CN',{minimumFractionDigits:1,maximumFractionDigits:1})}

function renderPage(){
  if(!DATA) return;
  var d = DATA;
  
  // KPI
  document.getElementById('kpiRow').innerHTML =
    '<div class="kpi-card"><div class="kl">消费VIP</div><div class="kv" style="color:#f5576c">'+d.vip_cnt+'</div><div class="ks">人</div></div>'+
    '<div class="kpi-card"><div class="kl">交易笔数</div><div class="kv" style="color:#4361ee">'+d.total_orders+'</div><div class="ks">笔</div></div>'+
    '<div class="kpi-card"><div class="kl">销售件数</div><div class="kv" style="color:#06d6a0">'+d.total_qty+'</div><div class="ks">件</div></div>'+
    '<div class="kpi-card"><div class="kl">销售金额</div><div class="kv" style="color:#10b981">¥'+fmt(d.total_amt)+'</div><div class="ks">元</div></div>';
  
  // VIP排行
  var vb = document.getElementById('vipRankBody');
  vb.innerHTML = '';
  d.vip_rank.forEach(function(v){
    vb.innerHTML += '<tr><td style="font-weight:600">'+v.name+'</td><td class="text-right">'+v.orders+'</td><td class="text-right">'+v.qty+'</td><td class="text-right" style="color:#be185d;font-weight:700">¥'+fmt(v.amt)+'</td></tr>';
  });
  
  // 明细
  var dt = document.getElementById('detailBody');
  dt.innerHTML = '';
  d.detail.forEach(function(r){
    var ds = r.date.toString();
    var dd = ds.substring(0,4)+'-'+ds.substring(4,6)+'-'+ds.substring(6,8);
    var disc = r.disc ? (r.disc < 1 ? (r.disc*10).toFixed(0)+'折' : r.disc.toFixed(1)+'折') : '-';
    dt.innerHTML += '<tr><td style="font-size:10px">'+r.doc+'</td><td>'+dd+'</td><td>'+r.vip+'</td><td>'+r.prod+'</td><td>'+r.pval+'</td><td class="text-right">'+r.qty+'</td><td class="text-right" style="font-weight:600">¥'+fmt(r.amt)+'</td><td class="text-right">'+disc+'</td></tr>';
  });
  dt.innerHTML += '<tr class="total-row"><td colspan="5">合计</td><td class="text-right">'+d.total_qty+'</td><td class="text-right" style="font-weight:700">¥'+fmt(d.total_amt)+'</td><td></td></tr>';
  
  // 图表
  drawCharts(d);
}

function drawCharts(d){
  // VIP排行图
  new Chart(document.getElementById('vipChart'), {
    type: 'bar',
    data: {
      labels: d.vip_rank.map(function(v){return v.name.substring(0,6)}),
      datasets: [{label:'消费金额',data:d.vip_rank.map(function(v){return v.amt}),backgroundColor:'#f5576c',borderRadius:4}]
    },
    options: {indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{beginAtZero:true,ticks:{font:{size:9}}},y:{ticks:{font:{size:9,weight:'bold'}}}}}
  });
  
  // 每日趋势
  new Chart(document.getElementById('dailyChart'), {
    type: 'line',
    data: {
      labels: ['5.1','5.2','5.3','5.4','5.5','5.6','5.7','5.8'],
      datasets: [
        {label:'金额(元)',data:d.daily_amt,borderColor:'#f5576c',backgroundColor:'rgba(245,87,108,.1)',fill:true,tension:.3,pointRadius:4},
        {label:'笔数',data:d.daily_cnt,borderColor:'#4361ee',backgroundColor:'transparent',tension:.3,pointRadius:3,yAxisID:'y1',borderDash:[5,3]}
      ]
    },
    options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:9}}},y1:{position:'right',beginAtZero:true,ticks:{font:{size:9}}}}}
  });
}

// 初始化
if(DATA) renderPage();
</script>
