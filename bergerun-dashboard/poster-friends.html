<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朋友圈邀请函</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;background:#333;padding:20px}
.poster{width:540px;height:540px;background:linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 30%,#FFF8E1 70%,#FFFDE7 100%);position:relative;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#1A4A2B}
/* 装饰 */
.leaf{position:absolute;font-size:60px;opacity:.15}
.leaf:nth-child(1){top:20px;left:20px;transform:rotate(-30deg)}
.leaf:nth-child(2){top:60px;right:30px;transform:rotate(45deg)}
.leaf:nth-child(3){bottom:40px;left:40px;transform:rotate(15deg)}
.leaf:nth-child(4){bottom:20px;right:50px;transform:rotate(-20deg)}
.dot-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 30%,rgba(45,125,70,.05) 1px,transparent 1px),radial-gradient(circle at 80% 70%,rgba(45,125,70,.05) 1px,transparent 1px);background-size:40px 40px}
/* 粽子 */
.center-zongzi{position:absolute;top:30px;left:50%;transform:translateX(-50%);font-size:100px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1))}
/* 内容 */
.content{position:absolute;top:150px;left:0;right:0;text-align:center;z-index:2}
.ctitle{font-size:40px;font-weight:900;letter-spacing:4px;line-height:1.3}
.ctitle .gold{color:#D4A017;font-size:44px}
.rule-box{background:rgba(255,255,255,.8);border-radius:16px;margin:20px 40px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.rule{font-size:18px;margin:6px 0;display:flex;align-items:center;justify-content:center;gap:8px}
.rule .step{width:26px;height:26px;border-radius:50%;background:#2D7D46;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.prize{font-size:22px;margin-top:10px;padding-top:10px;border-top:1px dashed #ccc}
.prize .big{color:#D9363E;font-weight:900;font-size:28px}
/* 底部 */
.footer2{position:absolute;bottom:30px;left:0;right:0;text-align:center;z-index:2}
.more{font-size:14px;color:#666;margin-bottom:4px}
.store-line{font-size:16px;font-weight:700;color:#1A4A2B;letter-spacing:2px}
.top-ribbon{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2D7D46,#D4A017,#2D7D46);z-index:3}
</style>
</head>
<body>
<div class="poster">
  <div class="dot-bg"></div>
  <div class="top-ribbon"></div>
  <div class="leaf">🎋</div><div class="leaf">🎋</div><div class="leaf">🎋</div><div class="leaf">🎋</div>
  <div class="center-zongzi">🫔</div>

  <div class="content">
    <div class="ctitle">端午请你<br>吃<span class="gold">粽子</span></div>

    <div class="rule-box">
      <div class="rule"><span class="step">1</span> 转发此海报到朋友圈</div>
      <div class="rule"><span class="step">2</span> 集满 <b>20赞</b></div>
      <div class="rule"><span class="step">3</span> 到店出示截图</div>
      <div class="prize">领 <span class="big">¥50</span> 端午代金券</div>
    </div>

    <div class="more">还有 👇</div>
    <div style="font-size:15px;color:#666">
      🔥 积分翻倍兑 · 🎁 满399送粽礼 · 💥 爆品¥99
    </div>
  </div>

  <div class="footer2">
    <div class="store-line">📅 6.18-6.20  👉 分享集赞 到店即有礼</div>
  </div>
</div>
</body>
</html>
