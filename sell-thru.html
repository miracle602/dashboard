<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伯俊ERP · 售罄率报表</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="real-data.js?v=20260428"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a2e;padding:16px;max-width:1400px;margin:0 auto}
.nav{background:#1e293b;border-radius:12px;padding:10px 20px;display:flex;gap:20px;align-items:center;margin-bottom:16px}
.nav a{color:#94a3b8;text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px}
.nav a:hover{background:#334155;color:#fff}
.nav a.active{background:#4361ee;color:#fff}
.nav .title{color:#fff;font-size:16px;font-weight:600}
.header{background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;border-radius:16px;padding:20px 28px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;box-shadow:0 4px 20px rgba(230,57,70,.25)}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;opacity:.7;margin-top:2px}
.header .time{font-size:12px;opacity:.6;background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid #e2e8f0}
.kpi-card .label{font-size:12px;color:#64748b;margin-bottom:4px}
.kpi-card .val{font-size:24px;font-weight:700}
.kpi-card .val.green{color:#059669}
.kpi-card .val.yellow{color:#d97706}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid #e2e8f0}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#1e293b}
.chart-card canvas{max-height:300px}
.full{grid-column:1/-1}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff}
.toolbar button{padding:6px 14px;border:none;border-radius:8px;background:#4361ee;color:#fff;font-size:13px;cursor:pointer}
.toolbar button:hover{background:#3651d4}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;background:#f8fafc;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:6px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
tr:hover{background:#f8fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge.high{background:#d1fae5;color:#065f46}
.badge.mid{background:#fef3c7;color:#92400e}
.badge.low{background:#fee2e2;color:#991b1b}
.progress{width:100%;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress .bar{height:100%;border-radius:3px;transition:width .5s}
.progress .bar.green{background:#10b981}
.progress .bar.yellow{background:#f59e0b}
.progress .bar.red{background:#ef4444}
.footer{text-align:center;color:#94a3b8;font-size:11px;padding:20px 0}
</style>
</head>
<body>

<div class="nav">
  <span class="title">📊 伯俊ERP</span>
  <a href="./">零售看板</a>
  <a href="sell-thru.html" class="active">售罄率</a>
  <a href="retail-analysis.html">零售分析</a>
  <a href="retail-report.html">分析报告</a>
</div>

<div class="header">
  <div><h1>📈 售罄率分析报告</h1><div class="sub">2026年1-4月 · 伯俊ERP</div></div>
  <div class="time" id="updateTime">加载中...</div>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="搜索款号/品名" style="width:180px">
  <select id="rateFilter"><option value="all">全部</option><option value="high">高售罄(≥80%)</option><option value="mid">中等(50-80%)</option><option value="low">低售罄(&lt;50%)</option></select>
  <button onclick="filterTable()">筛选</button>
  <span style="font-size:12px;color:#94a3b8" id="resultCount"></span>
</div>

<div class="chart-grid">
  <div class="chart-card full">
    <h3>🎯 产品售罄率 TOP30</h3>
    <canvas id="sellThruChart"></canvas>
  </div>
</div>

<div class="chart-card full" style="border-radius:12px">
  <h3>📋 产品明细</h3>
  <div style="overflow-x:auto">
    <table>
      <thead><tr><th>排名</th><th>款号</th><th>品名</th><th>吊牌价</th><th>销售数量</th><th>采购数量</th><th>售罄率</th><th>进度条</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="footer">伯俊科技(云南)有限公司 · REST API数据</div>

<script>
var ALL_DATA = REAL_DATA.sell_thru || [];
var FD = ALL_DATA.slice();

function rateColor(r) { return r >= 80 ? 'badge high' : r >= 50 ? 'badge mid' : 'badge low'; }
function barColor(r) { return r >= 80 ? 'green' : r >= 50 ? 'yellow' : 'red'; }

function render() {
  var totalSold = 0, totalPurchased = 0, highCount = 0, midCount = 0, lowCount = 0;
  FD.forEach(function(p) {
    totalSold += p.sold; totalPurchased += p.purchased;
    if (p.rate >= 80) highCount++; else if (p.rate >= 50) midCount++; else lowCount++;
  });
  var overallRate = totalPurchased > 0 ? (totalSold / totalPurchased * 100).toFixed(1) : 0;
  var totalAmt = FD.reduce(function(s, p) { return s + (p.sold * (p.price || 0)); }, 0);

  var kg = document.getElementById('kpiGrid');
  kg.innerHTML =
    '<div class="kpi-card"><div class="label">📦 产品总数</div><div class="val">' + FD.length + '</div></div>' +
    '<div class="kpi-card"><div class="label">🎯 综合售罄率</div><div class="val ' + (overallRate >= 50 ? 'green' : '') + '">' + overallRate + '%</div></div>' +
    '<div class="kpi-card"><div class="label">📊 高售罄(≥80%)</div><div class="val green">' + highCount + '</div></div>' +
    '<div class="kpi-card"><div class="label">📊 中售罄(50-80%)</div><div class="val yellow">' + midCount + '</div></div>' +
    '<div class="kpi-card"><div class="label">📊 低售罄(<50%)</div><div class="val" style="color:#991b1b">' + lowCount + '</div></div>' +
    '<div class="kpi-card"><div class="label">💰 吊牌价总额</div><div class="val">¥' + Math.round(totalAmt / 10000).toLocaleString() + '万</div></div>';

  document.getElementById('resultCount').textContent = '共 ' + FD.length + ' 个款号';

  // 售罄率图(TOP30)
  var top30 = FD.slice(0, 30);
  // Chart.js destroy if exists
  if (window.scChart) window.scChart.destroy();
  var ctx = document.getElementById('sellThruChart').getContext('2d');
  window.scChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top30.map(function(p) { return (p.pname || '').substring(0, 10); }),
      datasets: [{ label: '售罄率%', data: top30.map(function(p) { return p.rate; }), backgroundColor: top30.map(function(p) { return p.rate >= 80 ? '#10b981' : p.rate >= 50 ? '#f59e0b' : '#ef4444'; }), borderRadius: 3, barPercentage: .6 }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return ctx.raw + '%'; } } } },
      scales: { x: { beginAtZero: true, max: 100, ticks: { callback: function(v) { return v + '%'; } }, grid: { color: 'rgba(0,0,0,.04)' } }, y: { grid: { display: false }, ticks: { font: { size: 9 } } } }
    }
  });

  // 表格
  var tb = document.getElementById('tableBody');
  tb.innerHTML = FD.map(function(p, i) {
    return '<tr><td>' + (i + 1) + '</td><td style="font-family:monospace;font-size:11px">' + (p.pname || '—') + '</td><td>' + (p.pval || '—') + '</td><td>¥' + (p.price || 0).toLocaleString() + '</td><td class="text-right">' + p.sold + '</td><td class="text-right">' + p.purchased + '</td><td><span class="' + rateColor(p.rate) + '">' + p.rate + '%</span></td><td style="width:120px"><div class="progress"><div class="bar ' + barColor(p.rate) + '" style="width:' + Math.min(p.rate, 100) + '%"></div></div></td></tr>';
  }).join('');
}

function filterTable() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var rf = document.getElementById('rateFilter').value;
  FD = ALL_DATA.filter(function(p) {
    if (q && (p.pname || '').toLowerCase().indexOf(q) < 0 && (p.pval || '').toLowerCase().indexOf(q) < 0) return false;
    if (rf === 'high' && p.rate < 80) return false;
    if (rf === 'mid' && (p.rate < 50 || p.rate >= 80)) return false;
    if (rf === 'low' && p.rate >= 50) return false;
    return true;
  });
  render();
}

render();
document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit' });
</script>
</body>
</html>
